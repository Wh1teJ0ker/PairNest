name: Flutter Quality Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master

env:
  FLUTTER_VERSION: '3.44.0'

jobs:
  audit:
    name: Analyze and Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@fd55f4c5af5b953cc57a2be44cb082c8f6635e8e
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Resolve deps
        run: flutter pub get

      - name: Format check
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Static analyze
        run: flutter analyze

      - name: Unit tests
        run: flutter test

      - name: Changelog policy check
        run: ./scripts/check_changelog.sh

      - name: UAT script self-tests
        run: ./scripts/test_uat_scripts.sh
