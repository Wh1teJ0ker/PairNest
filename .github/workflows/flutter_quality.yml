name: Flutter Quality Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master

env:
  FLUTTER_VERSION: '3.44.0'

jobs:
  audit:
    name: Analyze and Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Resolve deps
        run: flutter pub get

      - name: Format check
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Static analyze
        run: flutter analyze

      - name: Unit tests
        run: flutter test

      - name: Changelog policy check
        run: ./scripts/quality/check_changelog.sh

      - name: UAT script self-tests
        run: ./scripts/uat/test_uat_scripts.sh
