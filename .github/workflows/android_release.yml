name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FLUTTER_VERSION: "3.44.0"
  JAVA_VERSION: "17"

jobs:
  release-android:
    name: Build And Publish APKs
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release target
        id: target
        shell: bash
        run: |
          case "${{ github.event_name }}" in
            push)
              TAG_NAME="${GITHUB_REF_NAME}"
              REF_NAME="${GITHUB_REF}"
              ;;
            workflow_dispatch)
              if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
                echo "workflow_dispatch must target an existing tag ref" >&2
                echo "Example: gh workflow run android_release.yml --ref v0.1.0" >&2
                exit 1
              fi
              TAG_NAME="${GITHUB_REF_NAME}"
              REF_NAME="${GITHUB_REF}"
              ;;
            *)
              echo "Unsupported event: ${{ github.event_name }}" >&2
              exit 1
              ;;
          esac

          echo "tag=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "ref=${REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.target.outputs.ref }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@fd55f4c5af5b953cc57a2be44cb082c8f6635e8e
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Resolve deps
        run: flutter pub get

      - name: Read version from pubspec
        id: version
        shell: bash
        run: |
          PUBSPEC_VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          BUILD_NAME="${PUBSPEC_VERSION%%+*}"
          BUILD_NUMBER="${PUBSPEC_VERSION##*+}"
          TAG_NAME="${{ steps.target.outputs.tag }}"
          TAG_NAME="${TAG_NAME#v}"
          if [ "$BUILD_NAME" != "$TAG_NAME" ]; then
            echo "Tag $TAG_NAME does not match pubspec build name $BUILD_NAME" >&2
            exit 1
          fi
          echo "pubspec_version=$PUBSPEC_VERSION" >> "$GITHUB_OUTPUT"
          echo "build_name=$BUILD_NAME" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Build split release APKs
        run: |
          flutter build apk --release --split-per-abi \
            --build-name "${{ steps.version.outputs.build_name }}" \
            --build-number "${{ steps.version.outputs.build_number }}"

      - name: Rename release assets
        shell: bash
        run: |
          mkdir -p release-assets
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk "release-assets/pairnest-${{ steps.version.outputs.build_name }}-android-armeabi-v7a.apk"
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk "release-assets/pairnest-${{ steps.version.outputs.build_name }}-android-arm64-v8a.apk"
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk "release-assets/pairnest-${{ steps.version.outputs.build_name }}-android-x86_64.apk"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pairnest-${{ steps.version.outputs.build_name }}-android-release
          path: release-assets/*.apk

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.target.outputs.tag }}
          generate_release_notes: true
          files: release-assets/*.apk
